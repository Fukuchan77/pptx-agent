[tools]
python = "3.12"

[tasks.dev]
description = "Activate virtual environment"
run = """
#!/usr/bin/env bash
echo "Virtual environment is at: .venv"
echo "Activate with: source .venv/bin/activate"
echo "Or run commands with: uv run <command>"
"""

[tasks.test]
description = "Run pytest tests"
run = "uv run pytest"

[tasks."test-cov"]
description = "Run pytest with coverage report"
run = "uv run pytest --cov=src/pptx_agent --cov-report=term-missing --cov-report=html"

[tasks."test-qa"]
description = "Run QA module tests only"
run = "uv run pytest tests/unit/qa tests/integration/test_qa*.py -v"

[tasks."test-fixer"]
description = "Run fixer module tests only"
run = "uv run pytest tests/unit/fixer tests/integration/test_fix*.py -v"

[tasks."test-cache"]
description = "Run cache module tests only"
run = "uv run pytest tests/unit/cache -v"

[tasks.lint]
description = "Run ruff linter checks"
run = "uv run ruff check ."

[tasks."lint-fix"]
description = "Run ruff linter with auto-fix"
run = "uv run ruff check --fix ."

[tasks.format]
description = "Format code with ruff"
run = "uv run ruff format ."

[tasks.typecheck]
description = "Run pyright type checker"
run = "uv run pyright"

[tasks.ci]
description = "Run all CI checks (lint, typecheck, test)"
run = [
  "mise run lint",
  "mise run typecheck",
  "mise run test-cov"
]